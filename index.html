<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PortlandLive — Your search for Portland's best live music starts here</title>
<meta name="description" content="Your straight-forward guide to live music in Portland, OR.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@400;500;600;700&family=Bitter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#4a3526;          /* warm brown text */
  --rust:#b5562b;         /* accent rust/orange */
  --rust-deep:#8f3f1f;
  --forest:#3d574a;       /* logo green */
  --water:#5b8a76;        /* water teal */
  --water-d:#4a7563;
  --water-dd:#3f6555;
  --cream:#f3ead7;
  --sky-top:#9fd3d8;
  --sky-mid:#bfe0d4;
  --sky-warm:#f0e3a8;
  --hill-far:#8fae6b;
  --hill-mid:#7ba05a;
  --hill-near:#6b9b54;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Bitter',Georgia,serif;
  color:var(--ink);
  background:var(--water);
  -webkit-font-smoothing:antialiased;
}

/* ---------- HERO ---------- */
.hero{
  position:relative;
  width:100%;
  min-height:520px;
  overflow:hidden;
  background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 38%,var(--sky-warm) 72%,#e9dd9a 100%);
}
.scene{position:absolute;inset:0;width:100%;height:100%;display:block}
.hero-inner{
  position:relative;z-index:5;
  max-width:1180px;margin:0 auto;
  padding:54px 28px 0;
  text-align:center;
}
.eyebrow{
  font-family:'Oswald',sans-serif;font-weight:600;
  letter-spacing:.32em;text-transform:uppercase;
  color:var(--rust);font-size:clamp(13px,1.6vw,18px);
  margin-bottom:2px;
}
.headline{
  font-family:'Alfa Slab One',serif;
  color:var(--forest);
  font-size:clamp(30px,5.4vw,62px);
  line-height:.98;letter-spacing:.01em;
  text-shadow:0 2px 0 rgba(255,255,255,.35);
}
.starts{
  display:inline-block;margin-top:10px;
  font-family:'Oswald',sans-serif;font-weight:600;
  letter-spacing:.34em;text-transform:uppercase;
  color:var(--rust);font-size:clamp(13px,1.8vw,20px);
  transform:translateX(28%);
}
@media(max-width:640px){.starts{transform:none}}

/* watermark logo behind bird */
.watermark{
  position:absolute;z-index:2;
  top:120px;left:50%;transform:translateX(-50%);
  width:190px;height:190px;opacity:.16;
  pointer-events:none;
}
.watermark img{width:100%;height:100%;object-fit:contain}

/* ---------- CONTROL BAR (the "water") ---------- */
.controls{
  position:relative;z-index:6;
  background:var(--water);
  background-image:url('/water_bg.png');
  background-size:auto 46px;background-repeat:repeat;
  border-top:2px solid rgba(255,255,255,.18);
  padding:22px 0 30px;
  margin-top:-2px;
}
.controls-inner{max-width:1180px;margin:0 auto;padding:0 28px}
.ctl-row{display:flex;align-items:center;gap:14px 20px;flex-wrap:wrap}
.ctl-row + .ctl-row{margin-top:16px}

.ctl-label{
  font-family:'Alfa Slab One',serif;
  color:var(--cream);font-size:24px;letter-spacing:.01em;
  text-shadow:0 1px 0 rgba(0,0,0,.15);
}
.ctl-label .reg{font-family:'Bitter';font-weight:600;font-size:18px;margin-left:6px;color:#eef3ec}

.pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.28);
  color:var(--cream);
  font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;
  padding:9px 14px;border-radius:7px;cursor:pointer;
  transition:background .15s,border-color .15s;
}
.pill:hover{background:rgba(255,255,255,.2)}
.pill svg{width:16px;height:16px;flex:0 0 auto;opacity:.92}
.pill-date{opacity:.6;font-size:13px;font-weight:400;margin-left:-2px;white-space:nowrap}
.pill select,.pill input{
  background:transparent;border:0;color:var(--cream);
  font-family:'Oswald',sans-serif;font-size:15px;outline:none;cursor:pointer;
}
.pill select option{color:#27332c}
.pill input{cursor:text;min-width:90px}
.pill input::placeholder{color:rgba(243,234,215,.6)}

.search-pill{flex:1 1 280px;min-width:220px;background:rgba(255,255,255,.14)}
.search-pill input{flex:1;width:100%}

.icon-btn{
  width:42px;height:38px;display:inline-flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
  border-radius:7px;cursor:pointer;color:var(--cream);transition:background .15s;
}
.icon-btn:hover{background:rgba(255,255,255,.26)}
.icon-btn svg{width:18px;height:18px}
.icon-btn.active{background:var(--cream);color:var(--water-dd);border-color:var(--cream)}
.spacer{flex:1}
.view-toggle{display:flex;gap:8px}

.toggle{
  position:relative;width:34px;height:18px;border-radius:10px;
  background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.3);cursor:pointer;flex:0 0 auto;
}
.toggle::after{content:"";position:absolute;top:1px;left:1px;width:14px;height:14px;border-radius:50%;background:var(--cream);transition:left .15s}
.toggle.on{background:var(--rust)}
.toggle.on::after{left:17px}
.heart{appearance:none;border:0;background:transparent;cursor:pointer;padding:2px;line-height:0;color:var(--ink);opacity:.55;transition:opacity .15s,transform .12s,color .15s;flex:0 0 auto}
.heart svg{width:20px;height:20px;display:block}
.heart:hover{opacity:1;transform:scale(1.12)}
.heart.on{color:var(--rust);opacity:1}
.heart.on:hover{color:var(--rust-deep)}
.row .heart{margin-right:8px}

/* ---------- RESULTS ---------- */
.results-wrap{
  background:var(--water);
  background-image:url('/water_bg.png');
  background-size:auto 46px;background-repeat:repeat;
  padding:8px 0 70px;min-height:340px;
}
.results-inner{max-width:820px;margin:0 auto;padding:0 28px}

.daygroup{margin-top:30px}
.dayhead{
  font-family:'Alfa Slab One',serif;color:var(--cream);
  font-size:20px;letter-spacing:.02em;
  padding-bottom:8px;margin-bottom:16px;
  border-bottom:2px solid rgba(255,255,255,.22);
  text-shadow:0 1px 0 rgba(0,0,0,.12);
}
.dayhead .count{font-family:'Oswald';font-weight:500;font-size:13px;color:rgba(243,234,215,.7);margin-left:10px;letter-spacing:.08em}

.venue-card,.venue-row{cursor:pointer}
.venue-header{margin-bottom:18px}
.venue-header .venue-name{font-family:'Alfa Slab One',serif;font-size:26px;color:var(--cream);margin:6px 0 4px}
.venue-header .venue-info{color:var(--cream);opacity:.85;font-size:14px}
.back-link{display:inline-block;color:var(--rust);text-decoration:none;font-weight:600;font-size:14px;cursor:pointer}
.back-link:hover{text-decoration:underline}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.card{
  background:var(--cream);
  border-radius:9px;
  padding:16px 16px 14px;
  box-shadow:0 6px 14px rgba(20,40,30,.18);
  border-top:4px solid var(--rust);
  display:flex;flex-direction:column;
  transition:transform .12s,box-shadow .12s;
}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 22px rgba(20,40,30,.26)}
    /* image-forward grid cards (SHOW_IMAGES) */
    .card--img{padding:0;overflow:hidden;display:flex;flex-direction:column}
    .card-media{position:relative;width:100%;aspect-ratio:16/10;background:var(--ink);overflow:hidden}
    .card-tile{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center}
    .card-tile-t{font-family:'Alfa Slab One',serif;color:var(--cream);font-size:18px;line-height:1.12;text-shadow:0 2px 6px rgba(0,0,0,.35);overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;line-clamp:4;-webkit-box-orient:vertical}
    .card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1}
    .card-scrim{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(20,12,6,.55) 0%,rgba(20,12,6,.08) 38%,rgba(20,12,6,0) 60%)}
    .card--img .when{padding:10px 14px 0}
    .card--img .title{padding:0 14px}
    .card--img .venue{padding:0 14px}
    .card--img .meta{padding:0 14px}
    .card--img .foot{padding:0 14px 12px}
.card .when{
  font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--rust-deep);margin-bottom:6px;
}
.card .title{
  font-family:'Alfa Slab One',serif;font-size:18px;line-height:1.08;color:var(--forest);
  margin-bottom:10px;
}
.card .venue{font-weight:600;font-size:14px;color:var(--ink)}
.card .meta{font-size:12.5px;color:#7c6a55;margin-top:2px}
.card .foot{margin-top:auto;padding-top:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.nbtag{
  font-family:'Oswald';font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(61,87,74,.1);color:var(--forest);padding:4px 8px;border-radius:20px;font-weight:600;
}
.tix{
  font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  color:#fff;background:var(--rust);padding:6px 12px;border-radius:6px;text-decoration:none;transition:background .15s;
}
.tix:hover{background:var(--rust-deep)}

/* ===========================================================
   SINGLE-COLUMN SUBSTANTIAL CARDS (one dominant list view)
   Sized a touch SMALLER than the old grid tile, stacked 1/row.
   Two layouts, toggled via the floating "layout:" pill.
   =========================================================== */
.list{display:flex;flex-direction:column;gap:14px;background:transparent;border:0;border-radius:0;overflow:visible}

/* shared card shell (mirrors the old .card feel, slightly reduced) */
.scard{
  position:relative;
  background:var(--cream);
  border-radius:9px;
  border-top:4px solid var(--rust);
  box-shadow:0 6px 14px rgba(20,40,30,.18);
  overflow:hidden;
  transition:transform .12s,box-shadow .12s;
  cursor:default;
}
.scard:hover{transform:translateY(-2px);box-shadow:0 12px 22px rgba(20,40,30,.26)}

/* text colors inside the cream card */
.scard .s-when{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.11em;text-transform:uppercase;color:var(--rust-deep)}
.scard .s-title{font-family:'Alfa Slab One',serif;line-height:1.08;color:var(--forest)}
.scard .s-title a.rtitle{color:var(--forest);text-decoration:none;overflow-wrap:anywhere}
.scard .s-title a.rtitle:hover{text-decoration:underline;text-underline-offset:3px}
.scard .s-venue{font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-decoration-color:rgba(74,53,38,.45);text-underline-offset:3px}
.scard .s-venue:hover{text-decoration-style:solid}
.scard .s-meta{font-size:12.5px;color:#7c6a55}
.scard .s-nb{font-family:'Oswald';font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;background:rgba(61,87,74,.1);color:var(--forest);padding:4px 8px;border-radius:20px;font-weight:600}
.scard .heart{color:var(--ink);opacity:.5}
.scard .heart.on{color:var(--rust);opacity:1}
.scard .listen{align-self:center}

/* tile/image media block (shared by both layouts) */
.s-media{position:relative;background:var(--ink);overflow:hidden;flex:0 0 auto}
.s-tile{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;text-align:center}
.s-tile-t{font-family:'Alfa Slab One',serif;color:var(--cream);line-height:1.1;text-shadow:0 2px 6px rgba(0,0,0,.35);overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical}
.s-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1}
.s-scrim{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(20,12,6,.5) 0%,rgba(20,12,6,.06) 42%,rgba(20,12,6,0) 62%)}
.s-img--broken{display:none}

/* ---------- LAYOUT A : HORIZONTAL CARD (image left) ---------- */
.list--a .scard{display:flex;align-items:stretch;gap:0;min-height:108px}
.list--a .s-media{width:92px;align-self:stretch;min-height:108px}
.list--a .s-tile-t{font-size:14px}
.list--a .s-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:6px;padding:14px 16px}
.list--a .s-when{margin-bottom:1px}
.list--a .s-title{font-size:19px;margin:1px 0 2px}
.list--a .s-sub{display:flex;flex-wrap:wrap;align-items:baseline;gap:7px;font-size:13.5px;color:var(--ink)}
.list--a .s-sub .rdot{opacity:.4}
.list--a .s-foot{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:10px;padding:14px 16px 14px 0}
.list--a .s-foot .heart{align-self:flex-end}

/* imageless CLEAN-COLLAPSE in layout A: drop the media column entirely */
.list--a .scard.no-media .s-media{display:none}
.list--a .scard.no-media .s-body{padding-left:18px}

/* ---------- LAYOUT B : VERTICAL CARD (image on top) ---------- */
.list--b .scard{display:flex;flex-direction:column}
.list--b .s-media{width:100%;aspect-ratio:16/9}
.list--b .s-tile-t{font-size:22px;-webkit-line-clamp:4;line-clamp:4}
.list--b .s-body{display:flex;flex-direction:column;gap:7px;padding:14px 16px 15px}
.list--b .s-title{font-size:21px;margin:2px 0 1px}
.list--b .s-sub{display:flex;flex-wrap:wrap;align-items:baseline;gap:7px;font-size:13.5px;color:var(--ink)}
.list--b .s-sub .rdot{opacity:.4}
.list--b .s-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
/* in layout B, collapse the media when imageless+collapse mode */
.list--b .scard.no-media .s-media{display:none}

/* shared sub bits */
.s-time{font-family:'Oswald';font-weight:600;letter-spacing:.05em}
.s-date{white-space:nowrap}


.empty{text-align:center;padding:60px 20px;color:var(--cream)}
.empty h2{font-family:'Alfa Slab One',serif;font-size:26px;margin-bottom:6px;text-shadow:0 1px 0 rgba(0,0,0,.12)}
.empty p{opacity:.8}

.statusbar{
  max-width:1180px;margin:0 auto;padding:14px 28px 0;
  font-family:'Oswald';font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
  color:rgba(243,234,215,.72);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
}

/* footer */
.foot-bar{
  background:var(--water-dd);padding:26px 28px 34px;text-align:center;
  font-size:13px;color:rgba(243,234,215,.7);font-family:'Oswald';letter-spacing:.05em;
}
.foot-bar a{color:var(--cream)}
.foot-bar .brand{display:inline-flex;align-items:center;gap:9px;margin-bottom:8px}
.foot-bar .brand img{width:30px;height:30px}
.foot-bar .brand span{font-family:'Alfa Slab One';font-size:17px;color:var(--cream)}

@media(max-width:640px){
  .hero{min-height:400px}
  .hero-inner{padding-top:34px}
  .ctl-label{font-size:19px}
  .statusbar{font-size:11px}
}

/* MOBILE: restack show rows vertically on phones (desktop unchanged) */
@media (max-width:600px){
  .results{overflow-x:hidden}
  .results-inner{padding:0 16px}
  .row{gap:11px;padding:9px 10px}
          .row-img,.row-img--ph{width:46px;height:46px}
          .row-title{font-size:14.5px}
          .row-sub{font-size:11.5px;gap:5px}
          .listen{padding:6px 10px;font-size:10.5px}
  .dayhead{font-size:17px}
  .dayhead .count{display:block;margin-left:0;margin-top:2px}
  .grid{grid-template-columns:1fr;gap:12px}
  .card .when,.card .title,.card .venue{word-break:break-word}
}



/* venue browse rows (kept compact, distinct from show cards) */
.venues-list{display:flex;flex-direction:column;gap:10px}
.venues-list .row{display:flex;align-items:center;gap:14px;background:var(--cream);border-radius:9px;border-top:4px solid var(--forest);box-shadow:0 5px 12px rgba(20,40,30,.16);padding:13px 16px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.venues-list .row:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(20,40,30,.24)}
.venues-list .row-img-wrap{flex:0 0 auto}
.venues-list .row-img{width:52px;height:52px;border-radius:10px;display:block}
.venues-list .row-img--ph{display:flex;align-items:center;justify-content:center;color:var(--cream);font-family:'Alfa Slab One',serif;font-size:20px}
.venues-list .row-mid{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:3px}
.venues-list .row-title .rtitle{font-family:'Alfa Slab One',serif;font-size:17px;color:var(--forest)}
.venues-list .row-sub{display:flex;flex-wrap:wrap;align-items:baseline;gap:6px;font-size:12.5px;color:var(--ink)}
.venues-list .row-sub .rvenue-static{font-weight:600}
.venues-list .row-sub .rdot{opacity:.4}
.venues-list .row-sub .rnb{font-family:'Oswald';font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:#7c6a55}
.venues-list .row-chev{flex:0 0 auto;font-size:22px;line-height:1;color:rgba(74,53,38,.35)}

/* === LISTEN (Concept A) + sample modal === */
.row .listen{grid-area:listen;justify-self:end;align-self:center}
.listen{flex:0 0 auto;border:0;cursor:pointer;font-family:'Oswald',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:11px;color:#fff;background:var(--rust);border-radius:999px;padding:6px 12px;white-space:nowrap}
.listen:hover{background:var(--rust-deep)}
.ov{position:fixed;inset:0;background:rgba(40,28,18,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.ov.on{display:flex}
.modal{position:relative;background:var(--cream);border-radius:14px;max-width:440px;width:100%;padding:18px;border:1px solid var(--line);box-shadow:0 16px 40px rgba(0,0,0,.3)}
.modal h3{font-family:'Alfa Slab One',serif;margin:0 0 2px;font-size:16px;color:var(--ink)}
.modal .sub{font-family:'Oswald',sans-serif;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:rgba(74,53,38,.6);margin-bottom:12px}
.modal .badge{display:inline-block;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px;margin-bottom:10px}
.modal .b1{background:#dcebdf;color:#2f6a3f}.modal .b2{background:#f3e3c2;color:#9a6a16}.modal .b3{background:#f1d9d4;color:#9a3b2a}
.modal .playcard{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);background:#fff6e7;border:1px solid var(--line);border-radius:10px;padding:14px;margin:4px 0 12px;font-family:'Oswald',sans-serif;font-weight:600}
.modal .playcard:hover{border-color:var(--rust)}
.modal .ytlogo{display:inline-flex;align-items:center;justify-content:center;width:42px;height:30px;background:#f00;color:#fff;border-radius:6px}
.modal .links{display:flex;flex-wrap:wrap;gap:8px}
.modal .links a{font-family:'Oswald',sans-serif;font-size:12.5px;text-decoration:none;color:var(--ink);background:#fff6e7;border:1px solid var(--line);border-radius:8px;padding:8px 12px}
.modal .links a:hover{border-color:var(--rust)}
.modal .sm-x{position:absolute;top:8px;right:10px;border:0;background:none;cursor:pointer;font-size:22px;line-height:1;color:rgba(74,53,38,.6)}

/* MOBILE: substantial cards stay readable on phones */
@media (max-width:600px){
  .list--a .s-media{width:78px;min-height:96px}
  .list--a .scard{min-height:96px}
  .list--a .s-title{font-size:17px}
  .list--a .s-foot{padding:12px 12px 12px 0}
  .list--b .s-title{font-size:19px}
  .scard .s-body{padding-left:14px;padding-right:14px}
  .listen{padding:6px 10px;font-size:10.5px}
}

</style>
</head>
<body>

<header class="hero">
  <!-- Illustrated scene -->
  <svg class="scene" viewBox="0 0 1440 520" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#9fd3d8"/>
        <stop offset="0.42" stop-color="#c2e1d2"/>
        <stop offset="0.72" stop-color="#f0e3a8"/>
        <stop offset="1" stop-color="#ecdf95"/>
      </linearGradient>
      <radialGradient id="sun" cx="50%" cy="58%" r="55%">
        <stop offset="0" stop-color="#fff7d6" stop-opacity="0.95"/>
        <stop offset="0.5" stop-color="#fbeeb0" stop-opacity="0.55"/>
        <stop offset="1" stop-color="#f0e3a8" stop-opacity="0"/>

const $ = s => document.querySelector(s);

function fmtDay(iso){
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function fmtShort(iso){
  const d = new Date(iso + "T12:00:00");

}
function ordinalDate(iso){
  const d = new Date(iso+"T12:00:00"); const n=d.getDate();

}

async function load(){
  try{
    const res = await fetch('/shows.json',{cache:'no-store'});

    state.shows = data.shows || [];

}

function buildNeighborhoods(){
  const set = [...new Set(state.shows.map(s=>s.neighborhood).filter(Boolean))].sort();

  set.forEach(n=>{
    const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o);
  });
}

function applyTimeFilters(arr){
  let out = arr;
  if(state.myShows) out = out.filter(s => isFav(s));

    const t = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
    out = out.filter(s => s.date === t);
  }
  if(state.thisWeek){
    const today = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());

  }

}
function sortShows(arr){
  const by = state.sort;
  arr.sort((a,b)=>{
    if(by==="venue") return a.venue.localeCompare(b.venue) || a.date.localeCompare(b.date);
    if(by==="title") return a.title.localeCompare(b.title);
    if(by==="neighborhood") return (a.neighborhood||'').localeCompare(b.neighborhood||'') || a.date.localeCompare(b.date);

}
function filtered(){

  const todayPacific = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
  let out = state.shows.filter(s => s.date >= todayPacific);
  const q = state.q.trim().toLowerCase();
  if(q) out = out.filter(s => (s.title+" "+s.venue+" "+s.neighborhood).toLowerCase().includes(q));
   out = applyTimeFilters(out);
   sortShows(out);
  return out;
}

function render(){
  if(state.view === "venues"){ renderVenues(); return; }

  $('#resultCount').textContent = list.length
    ? `${list.length} show${list.length>1?'s':''} found`
    : "No results";

  if(!list.length){
    wrap.innerHTML = state.myShows ? '<div class="empty"><h2>No favorites yet</h2><p>Tap the heart on a show to save it.</p></div>' : '<div class="empty"><h2>No Results Found.</h2><p>Try widening your dates or clearing the search.</p></div>';
    return;
  }

  // group by day only when sorting by date AND no time-window filter (This Week off)
  if(state.sort === "date" && !state.thisWeek){
    const groups = {};
    list.forEach(s=>{(groups[s.date]=groups[s.date]||[]).push(s);});
    Object.keys(groups).sort().forEach(date=>{
      const g = document.createElement('div'); g.className='daygroup';
      g.innerHTML = `<div class="dayhead">${ordinalDate(date)}<span class="count">${groups[date].length} shows</span></div>`;
      g.appendChild(listOf(groups[date]));
      wrap.appendChild(g);
    });

    wrap.appendChild(listOf(list, true));
  }
}

  const _ncmp=(a,b)=>(a.neighborhood||"").localeCompare(b.neighborhood||"",undefined,{sensitivity:"base"})||a.name.localeCompare(b.name,undefined,{sensitivity:"base"});const _vcmp=(a,b)=>a.name.localeCompare(b.name,undefined,{sensitivity:"base"});const _dcmp=(a,b)=>(b.count-a.count)||a.name.localeCompare(b.name);const _cmp=state.sort==="neighborhood"?_ncmp:(state.sort==="venue"||state.sort==="title")?_vcmp:_dcmp;let venues = Object.values(groups).sort(_cmp);

        {
          const l = document.createElement('div'); l.className='list venues-list';

    function tileColor(s){

function smTier(t){try{return (typeof window!=='undefined'&&window.sampleFor)?window.sampleFor(t):{tier:3};}catch(e){return {tier:3};}}

function openSample(title){var r=smTier(title);var h='';if(r.tier===1){h+='<span class="badge b1">Tier 1 \u00b7 best match</span>';h+='<h3>'+esc(r.artist)+'</h3>';h+='<div class="sub">'+esc(r.mediaType||'music')+'</div>';h+='<a class="playcard" target="_blank" rel="noopener" href="'+esc(r.links&&r.links.youtube)+'"><span class="ytlogo">\u25b6</span><span>Play \u201c'+esc(r.artist)+'\u201d on YouTube</span></a>';h+=smLinks(r.links);}else if(r.tier===2){h+='<span class="badge b2">Tier 2 \u00b7 search links</span>';h+='<h3>'+esc(r.artist)+'</h3>';h+='<div class="sub">'+(r.mediaType==='spoken'?'spoken-word / non-music act':'name needs a human eye')+'</div>';h+=smLinks(r.links);}else{h+='<span class="badge b3">Tier 3 \u00b7 no sample</span><h3>'+esc(title)+'</h3><div class="sub">no sample available</div>';}h+='<button class="sm-x" id="smx" type="button" aria-label="Close">\u00d7</button>';document.getElementById('smmodal').innerHTML=h;document.getElementById('smov').classList.add('on');var x=document.getElementById('smx');if(x)x.onclick=closeSample;}
function closeSample(){var o=document.getElementById('smov');if(o)o.classList.remove('on');}
function smediaFor(s){
  const tile = `<div class="s-tile" style="background:${tileColor(s)}"><span class="s-tile-t">${esc(s.title)}</span></div>`;

$('#sortSel').addEventListener('change',e=>{state.sort=e.target.value;render();});
$('#venuesToggle').addEventListener('click',()=>{if(state.view==='venues'){state.view='shows';state.selectedVenue=null;$('#venuesToggle').classList.remove('on');$('#viewingWord').textContent='Shows';}else{state.view='venues';state.selectedVenue=null;$('#venuesToggle').classList.add('on');$('#viewingWord').textContent='Venues';}render();});
      $('#myShowsToggle').addEventListener('click',e=>{state.myShows=!state.myShows;e.currentTarget.classList.toggle('on',state.myShows);render();});
      function openVenue(name){ state.view='venues'; state.selectedVenue=name; $('#venuesToggle').classList.add('on'); $('#viewingWord').textContent='Venues'; render(); document.querySelector('.controls').scrollIntoView({block:'start',behavior:'instant'}); }
      $('#results').addEventListener('click',e=>{const vlink=e.target.closest('[data-venue]');if(vlink){e.preventDefault();e.stopPropagation();openVenue(vlink.getAttribute('data-venue'));return;}const h=e.target.closest('.heart');if(!h)return;e.preventDefault();e.stopPropagation();toggleFavKey(h.getAttribute('data-fav'));render();});
$('#tonightToggle').addEventListener('click',()=>{state.tonight=!state.tonight;if(state.tonight){state.thisWeek=false;$('#thisWeekToggle').classList.remove('on');}$('#tonightToggle').classList.toggle('on',state.tonight);render();});
$('#thisWeekToggle').addEventListener('click',()=>{state.thisWeek=!state.thisWeek;if(state.thisWeek){state.tonight=false;$('#tonightToggle').classList.remove('on');}$('#thisWeekToggle').classList.toggle('on',state.thisWeek);render();});
$('#resetBtn').addEventListener('click',()=>{
  state.q="";state.tonight=false;state.sort="date";state.view="shows";state.selectedVenue=null;$('#venuesToggle').classList.remove('on');$('#viewingWord').textContent='Shows';
  $('#searchInput').value="";
  $('#sortSel').value="date";$('#tonightToggle').classList.remove('on');state.thisWeek=false;$('#thisWeekToggle').classList.remove('on');state.myShows=false;$('#myShowsToggle').classList.remove('on');render();
});

    // Compute the Pacific dates the Tonight / This Week filters resolve to,
    // using the SAME Intl.DateTimeFormat('en-CA', America/Los_Angeles) method
    // as the filters, so the pill labels match the filter logic exactly.
    function setToggleDates(){
      const todayISO = new Intl.DateTimeFormat('en-CA',{timeZone:'America/Los_Angeles',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
      const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const fmt = iso => { const [y,m,d] = iso.split('-').map(Number); return MON[m-1] + ' ' + d; };
      const start = new Date(todayISO + 'T00:00:00');
      const upper = new Date(todayISO + 'T00:00:00'); upper.setDate(upper.getDate() + 6);
      const endISO = upper.getFullYear() + '-' + String(upper.getMonth()+1).padStart(2,'0') + '-' + String(upper.getDate()).padStart(2,'0');
      const tn = $('#tonightDate'); if(tn) tn.textContent = '\u00b7 ' + fmt(todayISO);
      const sameMonth = todayISO.slice(0,7) === endISO.slice(0,7);
      const endLabel = sameMonth ? String(Number(endISO.split('-')[2])) : fmt(endISO);
      const tw = $('#thisWeekDate'); if(tw) tw.textContent = '\u00b7 ' + fmt(todayISO) + '\u2013' + endLabel;
    }
    setToggleDates();
document.addEventListener('click',function(e){var b=e.target.closest&&e.target.closest('.listen');if(b){e.preventDefault();openSample(b.getAttribute('data-title'));return;}var o=document.getElementById('smov');if(o&&e.target===o)closeSample();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSample();});
load();

<style>
/* cloud + bird motion appended so it doesn't clutter main sheet */
.cloud{animation:drift 60s linear infinite;animation-delay:var(--cd,0s)}
@keyframes drift{from{transform:translateX(-30px)}50%{transform:translateX(40px)}to{transform:translateX(-30px)}}
.bird{transform-box:fill-box;transform-origin:center;animation:bob 3.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translate(795px,372px) rotate(0deg)}50%{transform:translate(795px,369px) rotate(-2deg)}}
.note{animation:notefloat 2.6s ease-in-out infinite}
@keyframes notefloat{0%{opacity:0;transform:translate(0,4px)}30%{opacity:1}100%{opacity:0;transform:translate(8px,-14px)}}
@media(prefers-reduced-motion:reduce){.cloud,.bird,.note{animation:none}}
</style>
<div class="ov" id="smov"><div class="modal" id="smmodal"></div></div>
<div id="layoutToggle" style="position:fixed;right:14px;bottom:54px;z-index:9999;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.04em;background:rgba(20,30,26,.92);color:#f3ead7;border:1px solid rgba(243,234,215,.3);border-radius:999px;padding:8px 14px;cursor:pointer;user-select:none;box-shadow:0 4px 14px rgba(0,0,0,.35)">layout: <b id="layoutToggleVal"></b></div>
<script>
(function(){
  var el=document.getElementById('layoutToggle'), val=document.getElementById('layoutToggleVal');
  function lbl(){ val.textContent = (state.cardLayout==='b') ? '2 \u00b7 VERTICAL' : '1 \u00b7 HORIZONTAL'; }
  lbl();
  el.addEventListener('click', function(){
    state.cardLayout = (state.cardLayout==='b') ? 'a' : 'b';
    try{ localStorage.setItem('cardLayout', state.cardLayout); }catch(e){}
    lbl();
    if(typeof render==='function') render();
  });
})();
</script>
<div id="phToggle" style="position:fixed;right:14px;bottom:14px;z-index:9999;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.04em;background:rgba(20,30,26,.92);color:#f3ead7;border:1px solid rgba(243,234,215,.3);border-radius:999px;padding:8px 14px;cursor:pointer;user-select:none;box-shadow:0 4px 14px rgba(0,0,0,.35)">imageless: <b id="phToggleVal"></b></div>
<script>
(function(){
  var el=document.getElementById('phToggle'), val=document.getElementById('phToggleVal');
  function lbl(){ val.textContent = (PLACEHOLDER_MODE==='collapse') ? 'CLEAN COLLAPSE' : '\u266a NOTE TILE'; }
  lbl();
  el.addEventListener('click', function(){
    PLACEHOLDER_MODE = (PLACEHOLDER_MODE==='collapse') ? 'note' : 'collapse';
    try{ localStorage.setItem('phMode', PLACEHOLDER_MODE); }catch(e){}
    lbl();
    if(typeof render==='function') render();
  });
})();
</script>
